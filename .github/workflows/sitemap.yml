# .github/workflows/sitemap.yml
name: Generate Sitemap

on:
  push:
    branches:
      - main # 或 master，根据你的主分支名称

# 关键修复：授予 GITHUB_TOKEN 写入仓库内容的权限
permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史，以便 Action 提取文件修改时间
          persist-credentials: true # 确保后续 git push 能使用 token

      - name: Generate sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://lammanchiu.github.io # 务必替换为你的实际网址

      - name: Commit and push sitemap
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add sitemap.xml
          # 如果有变动才提交并推送，避免空提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sitemap.xml" && git push)
