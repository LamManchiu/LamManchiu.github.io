<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历 - [姓名]</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="#hero" class="logo">[姓名]</a>
            <button class="hamburger" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="#about">关于我</a></li>
                <li><a href="#experience">经历</a></li>
                <li><a href="#education">教育</a></li>
                <li><a href="#skills">技能</a></li>
                <li><a href="#projects">项目</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="container">
            <h1>[姓名]</h1>
            <p class="subtitle">[职位/角色]</p>
            <a href="#contact" class="btn">联系我</a>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section">
        <div class="container">
            <h2 class="section-title">关于我</h2>
            <div class="about-content">
                <p>[个人简介内容]</p>
            </div>
        </div>
    </section>

    <!-- Experience Section -->
    <section id="experience" class="section bg-light">
        <div class="container">
            <h2 class="section-title">工作经历</h2>
            <div class="timeline">
                <div class="timeline-item">
                    <h3>[公司名称]</h3>
                    <p class="timeline-date">[时间]</p>
                    <p>[职位]</p>
                    <ul>
                        <li>[主要成就/职责]</li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <!-- Education Section -->
    <section id="education" class="section">
        <div class="container">
            <h2 class="section-title">教育背景</h2>
            <div class="timeline">
                <div class="timeline-item">
                    <h3>[学校名称]</h3>
                    <p class="timeline-date">[时间]</p>
                    <p>[专业] - [学位]</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="section bg-light">
        <div class="container">
            <h2 class="section-title">技能专长</h2>
            <div class="skills-grid">
                <div class="skill-category">
                    <h3>技术技能</h3>
                    <div class="skill-tags">
                        <span class="tag">[技能1]</span>
                        <span class="tag">[技能2]</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section">
        <div class="container">
            <h2 class="section-title">项目经验</h2>
            <div class="projects-grid">
                <div class="project-card">
                    <h3>[项目名称]</h3>
                    <p>[项目描述]</p>
                    <div class="tech-stack">
                        <span class="tag">[技术栈]</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section bg-light">
        <div class="container">
            <h2 class="section-title">联系方式</h2>
            <div class="contact-links">
                <a href="mailto:[邮箱]" class="contact-item">📧 [邮箱]</a>
                <a href="https://github.com/[用户名]" class="contact-item">🐙 GitHub</a>
                <a href="https://linkedin.com/in/[用户名]" class="contact-item">💼 LinkedIn</a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 [姓名]. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
